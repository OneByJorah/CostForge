services:
  # --- CostForge Backend ---
  costforge-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jorahone/costforge-backend:latest
    container_name: costforge-backend
    ports:
      - "8000:8000"
    environment:
      COSTFORGE_LOG: /app/usage.jsonl
      COSTFORGE_DB: /app/data/costforge.db
    volumes:
      - costforge-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- CostForge Frontend ---
  costforge-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: jorahone/costforge-frontend:latest
    container_name: costforge-frontend
    ports:
      - "8090:80"
    depends_on:
      costforge-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  costforge-data:
    name: costforge-data
