services:
  # --- CostForge Backend ---
  costforge-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: costforge-backend
    ports:
      - "8000:8000"
    environment:
      COSTFORGE_LOG: /app/usage.jsonl
    volumes:
      - costforge-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # --- CostForge Frontend ---
  costforge-frontend:
    image: nginx:alpine
    container_name: costforge-frontend
    ports:
      - "8090:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      costforge-backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  costforge-data: